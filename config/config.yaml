# Kani-miso Configuration
# This file is tracked in Git - NO SECRETS HERE
# Put secrets in config/.env (gitignored)

# Notes Storage Configuration
# The repo is the engine; the catalog lives in a separate Obsidian vault.
# Set notes_root to the ABSOLUTE path of your vault on this machine
# (e.g. "/home/connor/vault"). Do not commit personal paths.
# "." (repo root) is a fallback for testing only.
notes_root: "."

telegram:
  enabled: true
  queue_type: "sqlite"  # Queue storage method
  default_surface: "mobile"  # Assume mobile unless specified

twitter:
  enabled: true
  default_type: "Tweet"  # Note type for tweets
  include_replies: true  # Include reply tweets
  include_retweets: true  # Include retweets
  max_tweets_per_sync: 10  # Max tweets to fetch per sync

processing:
  batch_size: 500  # Max items to process in one run (increased for large tweet batches)
  auto_commit: true  # Create git commits automatically
  auto_push: false  # Require manual review before push

# LLM backend: Claude only (local Ollama/hybrid routing removed in Phase 0)
claude:
  model: "claude-opus-4-5-20251101"  # Claude Opus 4.5 - Highest quality, best reasoning
  max_tokens: 4096
  temperature: 0.7  # Slightly creative but consistent
  # Alternative: claude-sonnet-4-5-20250929 for faster/cheaper (still excellent)

git:
  commit_prefix: "process"  # Commit message prefix
  branch_strategy: "main"  # Commit directly to main

folders:
  notes: "notes"
  reflections: "reflections"
  sources: "sources"
  inbox: "inbox"
  hubs: "hubs"
  tweets: "tweets"
  images: "images"  # Date-organized image storage (images/YYYY/MM/DD/)

images:
  enabled: true
  # Images are stored in date-based folders: images/YYYY/MM/DD/image-001.jpg
  # When multiple images are sent, they are grouped and associated with the next text message
  wait_for_text: true  # Images without text stay pending until text is sent
  max_pending_images: 10  # Maximum images to buffer before auto-creating note

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/processor.log"
  console: true

paths:
  repo_root: "."
  queue_db: "queue/captures.db"
  specs_dir: "specs"
