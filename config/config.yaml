# Second Brain Configuration
# This file is tracked in Git - NO SECRETS HERE
# Put secrets in config/.env (gitignored)

# Notes Storage Configuration
# Set notes_root to a different directory to store notes separately from the GitHub repo
# Example: "C:/Users/YourName/Documents/SecondBrainNotes"
# Leave as "." to use the repository root (default behavior)
notes_root: "C:/Users/gilli/Desktop/Connor Work/Obsidian Notes"

telegram:
  enabled: true
  queue_type: "sqlite"  # Queue storage method
  default_surface: "mobile"  # Assume mobile unless specified

twitter:
  enabled: true
  default_type: "Tweet"  # Note type for tweets
  include_replies: true  # Include reply tweets
  include_retweets: true  # Include retweets
  max_tweets_per_sync: 10  # Max tweets to fetch per sync

processing:
  batch_size: 500  # Max items to process in one run (increased for large tweet batches)
  auto_commit: true  # Create git commits automatically
  auto_push: false  # Require manual review before push

claude:
  model: "claude-opus-4-5-20251101"  # Claude Opus 4.5 - Highest quality, best reasoning
  max_tokens: 4096
  temperature: 0.7  # Slightly creative but consistent
  # Alternative: claude-sonnet-4-5-20250929 for faster/cheaper (still excellent)

# LLM backend selection
# primary: hybrid (default) routes cheap captures to local Ollama and
# nuance-critical captures (Reflection, Source, PDF) to Claude. Set to
# "claude" to disable local processing entirely, or "ollama" to go local-only.
llm:
  primary: hybrid                   # hybrid | claude | ollama
  fallback_to_claude: true          # auto-fallback to Claude on local failure

  # Per-branch routing overrides. Valid values: local | claude | local_with_fallback
  routing:
    pdf: claude
    source: claude
    reflection: claude
    images: local_with_fallback
    default: local

  ollama:
    enabled: true
    base_url: "http://localhost:11434"
    model: "gemma4:e4b"
    temperature: 0.7
    num_predict: 4096               # equivalent of max_tokens
    timeout_seconds: 120
    prompt_profile: "local"         # specs/prompts/<profile>/
    verbatim_validation: strict     # strict | lenient | off
    retry_on_validation_fail: 1     # local retries before falling back to Claude

git:
  commit_prefix: "process"  # Commit message prefix
  branch_strategy: "main"  # Commit directly to main

folders:
  notes: "notes"
  reflections: "reflections"
  sources: "sources"
  inbox: "inbox"
  hubs: "hubs"
  tweets: "tweets"
  images: "images"  # Date-organized image storage (images/YYYY/MM/DD/)

images:
  enabled: true
  # Images are stored in date-based folders: images/YYYY/MM/DD/image-001.jpg
  # When multiple images are sent, they are grouped and associated with the next text message
  wait_for_text: true  # Images without text stay pending until text is sent
  max_pending_images: 10  # Maximum images to buffer before auto-creating note

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/processor.log"
  console: true

paths:
  repo_root: "."
  queue_db: "queue/captures.db"
  specs_dir: "specs"
