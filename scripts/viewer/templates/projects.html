{% extends "base.html" %}

{% block title %}Projects - Kani-miso Viewer{% endblock %}

{% block content %}
<div class="projects-container">
    <h1>Project Atlas</h1>
    <p class="subtitle">Active lines of inquiry</p>

    <div class="project-grid">
        {% for project in projects %}
        <a href="/note/{{ project.path }}" class="project-card">
            <h3>{{ project.title }}</h3>
            <span class="status-badge status-{{ project.status }}">{{ project.status }}</span>
            <span class="project-date">Created: {{ project.created_at|format_date }}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
